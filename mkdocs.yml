site_name: MatCreator
site_description: Agentic AI platform for computational materials science
site_url: https://ai4ms.github.io/MatCreator/
repo_url: https://github.com/AI4MS/MatCreator
repo_name: AI4MS/MatCreator
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  logo: images/logo.png
  favicon: images/logo.png
  features:
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Overview: overview.md
  - Deployment:
      - Overview: deployment.md
      - Personal Application: deployment/personal.md
      - Server Deployment: deployment/server.md
  - Knowledge:
      - Overview: knowledge/index.md
      - Know-Do Graph: knowledge_graph.md
      - Migration: knowledge/migration.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
